en:
  executor:
    info:
      agent: "[executor] Agent: %{name}"
      model: "[executor] Model: %{model}"
      session_mode: "[executor] Session mode: %{mode}"
      scheduler: "[executor] Scheduler: %{mode}"
      workspace: "[executor] Workspace: %{path}"
      target: "[executor] Target: %{path}"
      target_scope: "[executor] Target scope: %{path}"
      env_vars: "[executor] Env vars: %{keys}"
      guards: "[executor] Guards: %{guards}"
      event_handlers: "[executor] Event handlers: %{count}"
    check:
      uncommitted: "Target has uncommitted changes. Please commit or stash first:\n%{changes}\n  Target: %{target}"
    feature:
      not_found: "[executor] Feature not found: %{id}"
      not_runnable: "[executor] Feature %{id} is %{status}, not runnable"
      no_pending: "[executor] No pending features for agent '%{agent}'"
      create_hint: "  Use 'nezha feature create %{agent}' to create one"
      running: "[executor] Feature: %{id} (status=%{status})"
      workspace: "[executor] Feature workspace: %{path}"
      safety_failed: "[executor] Safety check failed: %{error}"
      branch_failed: "[executor] Failed to create branch '%{branch}': %{error}"
      branch_created: "[executor] Created branch: %{branch}"
      completed: "[executor] Feature %{id} → completed"
      partial: "[executor] Feature %{id} → partial (%{detail})"
      planner_done: "[executor] Feature %{id} → task_list.json generated (status: pending)"
      failed: "[executor] Feature %{id} → failed: %{error}"
    guard:
      blocked: "[executor] Guard blocked: %{reason}"
    session:
      multi_done: "\n[executor] Completed %{count} sessions"
      session_detail: "  Session %{n}: %{status} (turns=%{turns}, cost=%{cost})"
      result: "\n[executor] Result: %{status}"
      cost: "[executor] Cost: %{cost}"
      error: "[executor] Execution error: %{error}"
      tool:
        ok: "OK"
        error: "ERROR"
    post_tool:
      running: "[executor] Running post-tool: %{name} (%{action})"
      output: "[executor] %{name}: %{output}"
      failed: "[executor] %{name} failed: %{error}"
      error: "[executor] post-tool %{name} error: %{error}"
    git:
      no_changes: "[executor] No changes to commit"
      commit: "[executor] Git commit: %{msg}"
      push: "[executor] Git push: %{branch}"
      current_branch: "current branch"
      commit_failed: "[executor] Git commit failed: %{error}"
      push_failed: "[executor] Git push failed: %{error}"
    auto_planner:
      looking: "[executor] Missing task_list.json, searching for callable planner..."
      found: "[executor] Found planner: %{name}"
      success: "[executor] Planner generated task_list.json"
      failed: "[executor] Planner failed, falling back to single-round mode"
      not_found: "[executor] No callable planner found (need category=planning and callable=true)"
    error:
      interrupted: "\n\n[executor] Interrupted by user"
      resume_hint: "[executor] To resume, run the same command again"
      not_found: "[executor] Error: %{error}"
      fatal: "[executor] Fatal error: %{error}"
    vibe:
      config_not_found: "[vibe] Agent config not found: %{path}"
      no_tasks_dir: "[vibe] No features directory found for '%{agent}' (features/ does not exist)"
      task_not_found: "[vibe] Feature not found: %{id}"
      list_hint: "  Available features: nezha feature list %{agent}"
      task_workspace: "[vibe] Using feature workspace: %{path} (feature %{id})"
      title: "  VibeCoding Mode"
      info:
        agent: "  Agent: %{name}"
        model: "  Model: %{model}"
        workspace: "  Workspace: %{path}"
        target: "  Target: %{path}"
        task_id: "  Task ID: %{id}"
        context: "  Context: %{mode} (%{label})"
      help:
        instruction: "  Type your instructions. Enter 'quit' or 'exit' to stop."
        isolation: "  Each instruction runs as an isolated session.\n"
      context:
        all: "full history"
        latest: "current feature"
        none: "clean slate"
      session: "\n[vibe] Session %{n}: %{instruction}..."
      session_result: "\n[vibe] %{status} | turns=%{turns} | cost=%{cost} | time=%{time}ms"
      session_error: "[vibe] Error: %{error}"
      interrupted: "\n\n[vibe] Interrupted."
      done: "\n[vibe] Done. %{sessions} sessions, total cost: %{cost}"
    integration_test:
      cycle_start: "[test] Integration test — cycle %{cycle}/%{max_cycles}"
      command: "[test] Running: %{command}"
      passed: "[test] Integration tests PASSED (cycle %{cycle})"
      failed: "[test] Integration tests FAILED (cycle %{cycle})"
      fix_start: "[test] Running fix session..."
      fix_done: "[test] Fix session: %{status} | cost=%{cost}"
      max_cycles: "[test] Max cycles (%{max}) reached. Stopping."
      final_pass: "[test] FINAL: Integration tests PASSED after %{cycles} cycle(s)"
      final_fail: "[test] FINAL: Integration tests FAILED after %{cycles} cycle(s) — %{reason}"
  cli:
    status:
      no_file: "[status] No status file found. Executor may not have run yet."
      expected: "  Expected: %{path}"
      title: "  Agent Executor Status"
      status: "  Status:        %{value}"
      current_agent: "  Current Agent: %{agent}"
      session_id: "  Session ID:    %{id}"
      started: "  Started:       %{time}"
      updated: "  Last Updated:  %{time}"
      last_session: "\n  Last Session:"
      session_status: "    Status:   %{status}"
      turns: "    Turns:    %{turns}"
      cost: "    Cost:     %{cost}"
      duration: "    Duration: %{ms}ms"
      guard_block: "\n  Guard Block: %{block}"
      rework: "\n  Rework:"
      rework_active: "    Active:  %{count}"
      rework_total: "    Total:   %{count}"
      rework_features: "    Features: %{features}"
    history:
      no_history: "[history] No history found."
      no_records: "[history] No history records found."
      title: "  Execution History"
      total: "  Total: %{count} records"
    logs:
      no_logs: "[logs] No logs found."
      no_files: "[logs] No log files found."
      following: "[logs] Following: %{name}"
      latest: "[logs] Latest: %{name}"
      stopped: "\n[logs] Stopped following."
    rework:
      agent_not_found: "[rework] Agent config not found: %{path}"
      no_list: "[rework] task_list.json not found: %{path}"
      no_features: "[rework] No tasks found with IDs: %{ids}"
      available: "  Available: %{ids}"
      marked: "[rework] Marked %{count} feature(s) for rework:"
      feature: "  %{id}: %{note}"
      run_hint: "\n  Run `nezha run %{agent}` to start rework."
    plan:
      agent_not_found: "[plan] Agent config not found: %{path}"
      no_feature_list: "[plan] task_list.json not found in workspace: %{path}"
      title: "\nFeature Execution DAG \u2014 %{agent}"
      legend: "  Legend: \u2713=completed  !=rework  \u2192=ready  \u00b7=blocked  \u2717=skipped"
      total: "  Total:     %{count}"
      completed: "  Completed: %{done}/%{total}"
      ready: "  Ready:     %{count} (%{ids})"
      rework: "  Rework:    %{count} (%{ids})"
      blocked: "  Blocked:   %{count}"
      skipped: "  Skipped:   %{count} (%{ids})"
      blocked_details: "\n  Blocked details:"
      blocked_item: "    %{id}: blocked by %{deps}"
      all_done: "\n  Status: ALL DONE"
      deadlocked: "\n  Status: DEADLOCKED - no executable features"
      deadlock_hint: "  Use 'nezha vibe %{agent}' or 'nezha rework' to unblock"
    feature:
      agent_not_found: "[feature] Agent config not found: %{path}"
      created: "[feature] Created feature: %{id}"
      task_agent: "  Agent:   %{agent}"
      task_status: "  Status:  %{status}"
      task_path: "  Path:    %{path}"
      input_warning: "  WARNING: Input file not found: %{path}"
      input_copied: "  Copied:  %{name} \u2192 %{dst}"
      run_hint: "\n  Run with: nezha run %{agent} --feature-id %{id}"
      no_tasks_dir: "[feature] No features directory found for '%{agent}'"
      create_hint: "  Use 'nezha feature create %{agent}' to create the first feature"
      no_tasks: "[feature] No features found for '%{agent}'%{filter}"
      no_tasks_filter: " with status=%{status}"
      title: "\nFeatures \u2014 %{agent}"
      not_found: "[feature] Feature not found: %{id}"
      show_title: "\nFeature: %{id}"
      show_agent: "  Agent:        %{agent}"
      show_status: "  Status:       %{status}"
      show_created: "  Created:      %{time}"
      show_started: "  Started:      %{time}"
      show_completed: "  Completed:    %{time}"
      show_error: "  Error:        %{error}"
      show_branch: "  Branch:       %{branch}"
      show_base: "  Base branch:  %{base}"
      show_path: "\n  Path: %{path}"
      input_files: "\n  Input files:"
      input_file: "    %{name}"
      metadata: "\n  Metadata: %{data}"
      no_target: "[feature] Agent '%{agent}' has no target configured \u2014 nothing to push"
      no_branch: "[feature] Feature %{id} has no branch (branch_per_task may be false)"
      pushing: "[feature] Pushing branch '%{branch}' to origin..."
      pushed: "[feature] Pushed: %{branch}"
      push_failed: "[feature] Push failed:"
    init:
      exists_not_empty: "[init] Directory already exists and is not empty: %{path}"
      aborting: "  Aborting to avoid overwriting existing files."
      initialized: "[init] Initialized project: %{path}"
      created: "  Created:"
      env_warnings: "  Environment warnings:"
      warn_agent_exec: "  \u26a0  'nezha' not in PATH. Add to ~/.zshrc:\n       export PATH=\"%{dir}:$PATH\"\n     Then: source ~/.zshrc"
      warn_agent_exec_notfound: "  \u26a0  'nezha' not found. Re-install: pip install -e <agent-executor-path>"
      warn_claude: "  \u26a0  'claude' CLI not found (needed for 'nezha code').\n     Install: https://claude.ai/download"
      next_steps: "  Next steps:"
      next_cd: "    cd %{name}"
      next_run: "    nezha run coding-agent"
    agent_context:
      exists: "[agent-context] File already exists: %{path}"
      view_hint: "  Use 'nezha agent-context show %{agent}' to view it."
      created: "[agent-context] Created: %{path}"
      update_hint: "  The agent will update this file automatically after each task."
      not_found: "[agent-context] No agent-context.md found for '%{agent}'"
      expected: "  Expected: %{path}"
      create_hint: "  Use 'nezha agent-context init %{agent}' to create it."
    project:
      exists: "[project] Project directory already exists: %{path}"
      skip: "  Skipping initialization to avoid overwriting existing files."
      initialized: "[project] Initialized project directory: %{path}"
      created: "  Created:"
    code:
      agent_not_found: "[code] Agent config not found: %{path}"
      task_not_found: "[code] Feature not found: %{id}"
      list_hint: "  List features: nezha feature list %{agent}"
      task_workspace: "[code] Feature workspace: %{path}"
      latest_task: "[code] Using latest feature: %{id}"
      no_claude: "[code] 'claude' CLI not found."
      claude_install: "  Install: https://claude.ai/download  or  npm install -g @anthropic-ai/claude-code"
      launching: "  Launching Claude Code"
      mcp_written: "  MCP servers: %{count} written to %{path}"
      info:
        agent: "  Agent:     %{agent}"
        model: "  Model:     %{model}"
        workspace: "  Workspace: %{path}"
        target: "  Target:    %{path}"
        target_scope: "  Scope:     %{path}"
        base_url: "  Base URL:  %{url}"
        context_header: "## Current Project Context (%{agent}, workspace: %{workspace})"
    schedule:
      waiting: "[schedule] Scheduled execution at %{time} (in %{countdown})"
      cancel_hint: "[schedule] Press Ctrl+C to cancel"
      countdown: "[schedule] Starting in %{remaining}..."
      starting: "[schedule] Starting now!"
      cancelled: "[schedule] Cancelled by user"
      error_mutual: "Error: --at and --delay are mutually exclusive."
      invalid_delay: "Invalid delay format: '%{value}'. Expected: 30s, 5m, 1h, 1h30m"
      invalid_at: "Invalid time format: '%{value}'. Expected: HH:MM or HH:MM:SS"
      delay_zero: "Delay must be greater than 0"
    main:
      not_implemented: "[nezha] '%{command}' not yet implemented."
